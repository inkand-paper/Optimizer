name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please be as specific as possible.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or gap this feature would address.
      placeholder: "I always have to do X manually because NexPulse doesn't..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see built.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Uptime Monitoring
        - Cache Pulse / Revalidation
        - Code Audit
        - SEO & Performance Audit
        - Pulse-AI
        - Webhooks / Alerts
        - Dashboard UI
        - API / Integrations
        - Self-Hosting
        - Billing / Plans
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches you considered.

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would significantly improve my workflow
        - Blocking — I can't use NexPulse without this
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, references, related issues, etc.
